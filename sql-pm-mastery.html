// Helper for case-insensitive column key mapping
function getRowValueInsensitive(row, colName) {
  if (!row) return undefined;
  const colLower = colName.toLowerCase().trim();
  for (const key of Object.keys(row)) {
    if (key.toLowerCase() === colLower) {
      return row[key];
    }
  }
  return undefined;
}

// ==========================================
// CLIENT-SIDE MOCK SQL ENGINE & PARSER
// ==========================================
function executeSQLQuery(queryStr) {
  try {
    let cleanQuery = queryStr.trim().replace(/\s+/g, ' ');
    if (cleanQuery.endsWith(';')) {
      cleanQuery = cleanQuery.slice(0, -1);
    }

    // Clean parentheses from ON clause if present
    cleanQuery = cleanQuery.replace(/ON\s*\(\s*([\w\.]+)\s*=\s*([\w\.]+)\s*\)/i, 'ON $1 = $2');

    const selectRegex = /^SELECT\s+(.*?)\s+FROM\s+(\w+)(?:\s+(LEFT\s+JOIN|INNER\s+JOIN|JOIN)\s+(\w+)\s+ON\s+([\w\.]+)\s*=\s*([\w\.]+))?(?:\s+WHERE\s+(.*?))?(?:\s+GROUP\s+BY\s+(.*?))?(?:\s+ORDER\s+BY\s+(.*?))?(?:\s+LIMIT\s+(\d+))?$/i;
    
    const match = cleanQuery.match(selectRegex);
    if (!match) {
      if (!/^SELECT/i.test(cleanQuery)) {
        return { success: false, error: "Queries must start with 'SELECT'." };
      }
      if (!/\s+FROM\s+/i.test(cleanQuery)) {
        return { success: false, error: "Missing 'FROM' clause." };
      }
      return { 
        success: false, 
        error: "Query syntax currently not fully supported by local PM engine. Use standard keywords: SELECT, FROM, JOIN, ON, WHERE, GROUP BY, ORDER BY, LIMIT." 
      };
    }

    const selectClause = match[1];
    const fromTable = match[2].toLowerCase();
    const joinType = match[3];
    const joinTable = match[4];
    const joinKey1 = match[5];
    const joinKey2 = match[6];
    const whereClause = match[7];
    const groupByClause = match[8];
    const orderByClause = match[9];
    const limitClause = match[10];

    if (!MOCK_DATABASE[fromTable]) {
      return { success: false, error: `Table '${fromTable}' does not exist in the PM database.` };
    }

    let rows = MOCK_DATABASE[fromTable].map(r => ({ ...r, _table: fromTable }));

    if (joinType && joinTable) {
      const lowerJoinTable = joinTable.toLowerCase();
      if (!MOCK_DATABASE[lowerJoinTable]) {
        return { success: false, error: `Table '${joinTable}' in JOIN clause does not exist.` };
      }
      
      const table2Rows = MOCK_DATABASE[lowerJoinTable];
      const joinedRows = [];

      rows.forEach(r1 => {
        let matched = false;
        table2Rows.forEach(r2 => {
          // Helper to get join key value without being sensitive to prefixes or case
          const getJoinKeyValue = (keyPart) => {
            const parts = keyPart.split('.');
            if (parts.length === 2) {
              const tbl = parts[0].toLowerCase();
              const col = parts[1];
              if (tbl === fromTable) {
                return getRowValueInsensitive(r1, col);
              } else {
                return getRowValueInsensitive(r2, col);
              }
            } else {
              const col = parts[0];
              const val1 = getRowValueInsensitive(r1, col);
              const val2 = getRowValueInsensitive(r2, col);
              return val1 !== undefined ? val1 : val2;
            }
          };

          const v1 = getJoinKeyValue(joinKey1);
          const v2 = getJoinKeyValue(joinKey2);

          if (v1 !== undefined && v2 !== undefined && String(v1) === String(v2)) {
            joinedRows.push({ ...r1, ...r2, id: r1.id });
            matched = true;
          }
        });

        if (!matched && joinType.toUpperCase().includes('LEFT')) {
          const nullRow = {};
          Object.keys(table2Rows[0]).forEach(k => {
            nullRow[k] = null;
          });
          joinedRows.push({ ...r1, ...nullRow });
        }
      });
      rows = joinedRows;
    }

    if (whereClause) {
      rows = rows.filter(row => {
        const parts = whereClause.split(/\s*(=|>|<|>=|<=|!=|LIKE|IN)\s*/i);
        if (parts.length >= 3) {
          const colRaw = parts[0].trim().replace(/^\w+\./, '');
          const op = parts[1].toUpperCase().trim();
          let val = parts[2].trim().replace(/['"]/g, '');

          const rowValue = getRowValueInsensitive(row, colRaw);
          if (rowValue === undefined || rowValue === null) return false;

          if (op === '=') return String(rowValue).toLowerCase() === val.toLowerCase();
          if (op === '!=') return String(rowValue).toLowerCase() !== val.toLowerCase();
          if (op === '>') return Number(rowValue) > Number(val);
          if (op === '<') return Number(rowValue) < Number(val);
          if (op === '>=') return Number(rowValue) >= Number(val);
          if (op === '<=') return Number(rowValue) <= Number(val);
          if (op === 'LIKE') {
            const regexStr = val.replace(/%/g, '.*');
            return new RegExp(`^${regexStr}$`, 'i').test(rowValue);
          }
          if (op === 'IN') {
            const list = val.replace(/[\(\)]/g, '').split(',').map(s => s.trim().replace(/['"]/g, ''));
            return list.includes(String(rowValue));
          }
        }
        return true;
      });
    }

    let resultRows = [];
    if (groupByClause) {
      const groupCol = groupByClause.trim().replace(/^\w+\./, '');
      const groups = {};

      rows.forEach(row => {
        const val = getRowValueInsensitive(row, groupCol);
        const gKey = val !== undefined ? String(val) : 'NULL';
        if (!groups[gKey]) groups[gKey] = [];
        groups[gKey].push(row);
      });

      const selectFields = selectClause.split(',').map(s => s.trim());
      
      Object.keys(groups).forEach(keyVal => {
        const groupRows = groups[keyVal];
        const newRow = {};
        
        selectFields.forEach(field => {
          const fieldLower = field.toLowerCase();
          
          if (fieldLower.includes('count(')) {
            if (fieldLower.includes('count(distinct')) {
              const aggCol = field.match(/distinct\s+([\w\.]+)/i)?.[1]?.replace(/^\w+\./, '');
              if (aggCol) {
                const uniqueVals = new Set(groupRows.map(r => getRowValueInsensitive(r, aggCol)).filter(v => v !== null && v !== undefined));
                newRow[field] = uniqueVals.size;
              } else {
                newRow[field] = groupRows.length;
              }
            } else {
              newRow[field] = groupRows.length;
            }
          } else if (fieldLower.includes('sum(')) {
            const aggCol = field.match(/\((.*?)\)/)[1].trim().replace(/^\w+\./, '');
            const total = groupRows.reduce((sum, r) => sum + (Number(getRowValueInsensitive(r, aggCol)) || 0), 0);
            newRow[field] = total;
          } else if (fieldLower.includes('avg(')) {
            const aggCol = field.match(/\((.*?)\)/)[1].trim().replace(/^\w+\./, '');
            const total = groupRows.reduce((sum, r) => sum + (Number(getRowValueInsensitive(r, aggCol)) || 0), 0);
            newRow[field] = groupRows.length ? Number((total / groupRows.length).toFixed(2)) : 0;
          } else {
            const plainCol = field.replace(/^\w+\./, '');
            const val = getRowValueInsensitive(groupRows[0], plainCol);
            newRow[field] = val !== undefined ? val : null;
          }
        });
        resultRows.push(newRow);
      });
    } else {
      const selectFields = selectClause.split(',').map(s => s.trim());
      const hasAggregates = selectFields.some(f => f.toLowerCase().includes('count(') || f.toLowerCase().includes('sum(') || f.toLowerCase().includes('avg('));

      if (hasAggregates) {
        const newRow = {};
        selectFields.forEach(field => {
          const fieldLower = field.toLowerCase();
          if (fieldLower.includes('count(')) {
            if (fieldLower.includes('count(distinct')) {
              const aggCol = field.match(/distinct\s+([\w\.]+)/i)?.[1]?.replace(/^\w+\./, '');
              if (aggCol) {
                const uniqueVals = new Set(rows.map(r => getRowValueInsensitive(r, aggCol)).filter(v => v !== null && v !== undefined));
                newRow[field] = uniqueVals.size;
              } else {
                newRow[field] = rows.length;
              }
            } else {
              newRow[field] = rows.length;
            }
          } else if (fieldLower.includes('sum(')) {
            const aggCol = field.match(/\((.*?)\)/)[1].trim().replace(/^\w+\./, '');
            const total = rows.reduce((sum, r) => sum + (Number(getRowValueInsensitive(r, aggCol)) || 0), 0);
            newRow[field] = total;
          } else if (fieldLower.includes('avg(')) {
            const aggCol = field.match(/\((.*?)\)/)[1].trim().replace(/^\w+\./, '');
            const total = rows.reduce((sum, r) => sum + (Number(getRowValueInsensitive(r, aggCol)) || 0), 0);
            newRow[field] = rows.length ? Number((total / rows.length).toFixed(2)) : 0;
          } else {
            newRow[field] = 'Aggregated context only';
          }
        });
        resultRows.push(newRow);
      } else {
        rows.forEach(row => {
          const newRow = {};
          selectFields.forEach(field => {
            if (field === '*') {
              Object.assign(newRow, row);
              delete newRow._table;
            } else {
              const plainCol = field.replace(/^\w+\./, '');
              const val = getRowValueInsensitive(row, plainCol);
              newRow[field] = val !== undefined ? val : null;
            }
          });
          resultRows.push(newRow);
        });
      }
    }

    if (orderByClause) {
      const parts = orderByClause.trim().split(/\s+/);
      const sortCol = parts[0].replace(/^\w+\./, '');
      const isDesc = parts[1] && parts[1].toUpperCase() === 'DESC';
      
      resultRows.sort((a, b) => {
        let vA = getRowValueInsensitive(a, sortCol);
        let vB = getRowValueInsensitive(b, sortCol);
        if (vA === undefined || vA === null) return isDesc ? -1 : 1;
        if (vB === undefined || vB === null) return isDesc ? 1 : -1;
        if (typeof vA === 'string') {
          return isDesc ? String(vB).localeCompare(String(vA)) : String(vA).localeCompare(String(vB));
        } else {
          return isDesc ? (Number(vB) - Number(vA)) : (Number(vA) - Number(vB));
        }
      });
    }

    if (limitClause) {
      const num = parseInt(limitClause, 10);
      resultRows = resultRows.slice(0, num);
    }

    return { success: true, columns: Object.keys(resultRows[0] || {}), rows: resultRows };
  } catch (err) {
    return { success: false, error: `Syntax error: ${err.message}` };
  }
}

                    queryResult.rows.length > 0 ? (
                      <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-x-auto max-h-60">
                        <table className="w-full text-left border-collapse">
                          <thead>
                            <tr className="border-b border-slate-800 bg-slate-950 text-[10px] text-slate-400 uppercase tracking-widest font-extrabold">
                              {queryResult.columns.map(col => (
                                <th key={col} className="p-2.5 border-r border-slate-800">{col}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-800/60 text-xs font-mono">
                            {queryResult.rows.map((row, rIdx) => (
                              <tr key={rIdx} className="hover:bg-slate-800/40 text-slate-300">
                                {queryResult.columns.map((col, cIdx) => (
                                  <td key={cIdx} className="p-2.5 border-r border-slate-800/60">
                                    {row[col] === null ? (
                                      <span className="text-slate-600 italic">null</span>
                                    ) : (
                                      String(row[col])
                                    )}
                                  </td>
                                ))}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    ) : (
                      <div className="bg-slate-900/60 rounded-xl p-6 text-center text-slate-400 border border-dashed border-slate-800 text-xs">
                        Query returned 0 rows. Confirm filters or column matches.
                      </div>
                    )
                  ) : (
                    <div className="bg-rose-500/10 border border-rose-500/20 text-rose-200 rounded-xl p-4 text-xs font-mono leading-relaxed">
                      ❌ {queryResult.error}
                    </div>
                  )
                ) : (
                  <div className="bg-slate-900/60 rounded-xl p-6 text-center text-slate-400 border border-dashed border-slate-800 text-xs">
                    Run query to inspect results.
                  </div>
                )}

              </div>

            </div>

          </div>
        )}

        {/* ==================== TAB 3: DYNAMIC INFOGRAPHICS ==================== */}
        {activeTab === 'visuals' && (
          <div className="space-y-6">
            
            {/* ROW 1: SQL PIPELINE EXECUTION ENGINE */}
            <div className="bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
              <div>
                <h3 className="text-lg font-bold text-white flex items-center">
                  <window.LucideLayers className="h-5 w-5 text-indigo-400 mr-2" />
                  Visual SQL Order of Execution
                </h3>
                <p className="text-xs text-slate-400 mt-1">
                  Did you know SQL databases process keywords in a different order than you write them? Click a stage to understand its impact.
                </p>
              </div>

              {/* Execution Pipeline Steps */}
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                {[
                  { step: "1. FROM", desc: "Database locates target tables.", pmNote: "Always pick the correct primary resource first." },
                  { step: "2. JOIN", desc: "Connects separate lists of parameters.", pmNote: "Crucial for adding metrics (subscription stats)." },
                  { step: "3. WHERE", desc: "Filters individual rows early.", pmNote: "E.g. filtering out inactive logs before counting." },
                  { step: "4. GROUP BY", desc: "Groups identical data for metrics.", pmNote: "Separating users by Country or Tier." },
                  { step: "5. HAVING", desc: "Filters aggregated calculations.", pmNote: "E.g. only showing categories with > 50 downloads." },
                  { step: "6. SELECT", desc: "Chooses columns & aliases.", pmNote: "Creates final columns to view." },
                  { step: "7. DISTINCT", desc: "Strips duplicate outputs.", pmNote: "Required for exact DAU user numbers." },
                  { step: "8. ORDER BY", desc: "Orders the visual rows.", pmNote: "Ranking features from highest to lowest usage." },
                  { step: "9. LIMIT", desc: "Slices final query length.", pmNote: "Saves memory on large databases." },
                ].map((item, idx) => (
                  <div key={idx} className="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-2 hover:border-indigo-500 transition-all cursor-pointer">
                    <span className="text-[10px] uppercase tracking-widest font-extrabold text-indigo-400">Stage {idx + 1}</span>
                    <h4 className="font-extrabold text-sm text-white">{item.step}</h4>
                    <p className="text-[11px] text-slate-400 leading-relaxed">{item.desc}</p>
                    <div className="mt-2 pt-2 border-t border-slate-800/80 text-[10px] text-cyan-400">
                      <span className="font-semibold text-slate-400">PM context:</span> {item.pmNote}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* ROW 2: INTERACTIVE JOINS Venn Diagrams */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              
              {/* INNER JOIN vs LEFT JOIN diagram */}
              <div className="bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-lg space-y-4">
                <div className="flex items-center space-x-2">
                  <window.LucideDatabase className="h-5 w-5 text-indigo-400" />
                  <h3 className="font-bold text-white text-base">Interactive Relational JOIN Venn Visuals</h3>
                </div>
                <p className="text-xs text-slate-400 leading-relaxed">
                  Hover or select join configurations to visualize matching intersections between Table A (Users) and Table B (Subscriptions).
                </p>

                {/* Venn SVG Diagram */}
                <div className="bg-slate-900/40 border border-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center space-y-6">
                  <div className="flex items-center space-x-[-40px]">
                    <div className="w-36 h-36 rounded-full bg-indigo-500/25 border-2 border-indigo-500 flex items-center justify-center text-xs font-bold text-indigo-200">
                      Table A (Users)
                    </div>
                    <div className="w-36 h-36 rounded-full bg-cyan-500/25 border-2 border-cyan-500 flex items-center justify-center text-xs font-bold text-cyan-200">
                      Table B (Subscriptions)
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3 w-full">
                    <div className="p-3 rounded-xl bg-slate-950 border border-slate-800 text-xs">
                      <p className="font-bold text-indigo-400 mb-1">INNER JOIN</p>
                      <p className="text-[11px] text-slate-400">Only returns users who have an active subscription record. If no match exists, they are skipped.</p>
                    </div>
                    <div className="p-3 rounded-xl bg-slate-950 border border-slate-800 text-xs">
                      <p className="font-bold text-cyan-400 mb-1">LEFT JOIN</p>
                      <p className="text-[11px] text-slate-400">Returns all users regardless of subscription. If they are unsubscribed, their status shows NULL.</p>
                    </div>
                  </div>
                </div>

              </div>

              {/* PM Metric Blueprint Cookbook */}
              <div className="bg-slate-950 border border-slate-800 rounded-3xl p-6 shadow-lg space-y-4">
                <div className="flex items-center space-x-2">
                  <window.LucideSparkles className="h-5 w-5 text-yellow-400" />
                  <h3 className="font-bold text-white text-base">PM Metric Blueprint Formulas</h3>
                </div>
                <p className="text-xs text-slate-400 leading-relaxed">
                  Common SaaS metrics translated into ready-to-use, optimized SQL scripts.
                </p>

                <div className="space-y-3">
                  {[
                    { title: "Daily Active Users (DAU)", code: "SELECT COUNT(DISTINCT user_id) FROM events WHERE event_date = '2026-03-24';" },
                    { title: "Annual Recurring Revenue (ARR)", code: "SELECT SUM(monthly_fee * 12) FROM subscriptions WHERE status = 'active';" },
                    { title: "Feature Adoption Count", code: "SELECT feature_name, COUNT(DISTINCT user_id) FROM feature_usage GROUP BY feature_name;" },
                    { title: "Subscriber List Profile", code: "SELECT u.name, s.status FROM users u JOIN subscriptions s ON u.id = s.user_id;" }
                  ].map((blueprint, bIdx) => (
                    <div key={bIdx} className="p-3 rounded-xl bg-slate-900 border border-slate-800 space-y-1.5">
                      <h4 className="font-bold text-xs text-white">{blueprint.title}</h4>
                      <code className="text-[11px] font-mono text-cyan-300 bg-slate-950 p-2 rounded-lg border border-slate-800 block overflow-x-auto">
                        {blueprint.code}
                      </code>
                    </div>
                  ))}
                </div>
              </div>

            </div>

          </div>
        )}

        {/* ==================== TAB 4: FLASHCARDS ==================== */}
        {activeTab === 'flashcards' && (
          <div className="max-w-2xl mx-auto space-y-6">
            
            <div className="text-center space-y-2">
              <h3 className="text-2xl font-bold text-white flex items-center justify-center space-x-2">
                <window.LucideBookOpen className="h-6 w-6 text-indigo-400" />
                <span>Spaced Repetition Active Recall</span>
              </h3>
              <p className="text-xs text-slate-400">
                Unlock all hints sequentially before accessing the correct query solution.
              </p>
            </div>

            {/* Flashcard Component */}
            <div 
              className="min-h-[250px] bg-gradient-to-br from-slate-950 to-slate-900 border border-slate-800 rounded-3xl p-6 sm:p-8 flex flex-col justify-between transition-all duration-300 hover:border-slate-700 shadow-2xl relative"
            >
              <div className="absolute right-4 top-4">
                <span className="text-[9px] uppercase tracking-widest font-extrabold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded-full">
                  Concept {currentCardIdx + 1} of {flashcards.length}
                </span>
              </div>

              <div className="my-auto space-y-5">
                <div className="text-center space-y-1">
                  <p className="text-[10px] text-slate-500 uppercase tracking-widest font-extrabold">Active Recalling Question</p>
                  <p className="text-sm sm:text-base font-bold text-slate-100">
                    {currentCard.question}
                  </p>
                </div>

                {/* Hints Output (Hidden or unlocked) */}
                {hintStep > 0 && currentCard.hints && (
                  <div className="space-y-2 pt-3 border-t border-slate-800/80">
                    <p className="text-[10px] text-amber-400 uppercase tracking-widest font-bold">
                      💡 Active Hints Unlocked ({hintStep} of {totalHints})
                    </p>
                    <div className="space-y-1.5">
                      {currentCard.hints.slice(0, hintStep).map((hintText, hIdx) => (
                        <p key={hIdx} className="bg-slate-900/80 p-2.5 rounded-xl border border-slate-800 text-xs text-slate-300 leading-relaxed">
                          {hintText}
                        </p>
                      ))}
                    </div>
                  </div>
                )}

                {/* Answer Display (Only available after all hints are used) */}
                {showAnswer && allHintsUsed && (
                  <div className="pt-4 border-t border-slate-800/80 text-center animate-fadeIn space-y-1">
                    <p className="text-[10px] text-emerald-400 uppercase tracking-widest font-bold">Correct Solution & Explanation</p>
                    <p className="text-xs sm:text-sm text-slate-200 leading-relaxed bg-slate-900/50 p-3 rounded-xl border border-emerald-500/10">
                      {currentCard.answer}
                    </p>
                  </div>
                )}
              </div>

              {/* Progress and Hint Unlocking Navigation */}
              <div className="flex flex-col sm:flex-row gap-3 pt-4 justify-center items-center">
                {!allHintsUsed ? (
                  <button
                    onClick={() => {
                      setHintStep(prev => Math.min(prev + 1, totalHints));
                    }}
                    className="w-full sm:w-auto bg-amber-600/10 hover:bg-amber-600/25 text-amber-400 border border-amber-500/20 text-xs font-bold py-2 px-4 rounded-xl transition flex items-center justify-center space-x-1.5"
                  >
                    <window.LucideHelpCircle className="h-4 w-4" />
                    <span>Unlock Next Hint ({hintStep}/{totalHints})</span>
                  </button>
                ) : (
                  !showAnswer && (
                    <button
                      onClick={() => setShowAnswer(true)}
                      className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-2 px-5 rounded-xl shadow-lg shadow-emerald-600/15 transition flex items-center justify-center space-x-1.5"
                    >
                      <window.LucideSparkles className="h-4 w-4 animate-pulse" />
                      <span>Reveal Verified Answer</span>
                    </button>
                  )
                )}
              </div>
            </div>

            {/* Rating Controls (Active Spaced Repetition) */}
            {showAnswer && (
              <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-3 text-xs animate-fadeIn">
                <span className="text-slate-400 font-medium">Rate memory difficulty for current card:</span>
                <div className="flex space-x-2 w-full sm:w-auto">
                  <button 
                    onClick={() => handleRateFlashcard('easy')}
                    className="flex-1 sm:flex-none bg-emerald-600/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-600/20 px-4 py-2 rounded-xl font-bold transition text-center"
                  >
                    🟢 Easy
                  </button>
                  <button 
                    onClick={() => handleRateFlashcard('medium')}
                    className="flex-1 sm:flex-none bg-amber-600/10 text-amber-400 border border-amber-500/20 hover:bg-amber-600/20 px-4 py-2 rounded-xl font-bold transition text-center"
                  >
                    🟡 Medium
                  </button>
                  <button 
                    onClick={() => handleRateFlashcard('hard')}
                    className="flex-1 sm:flex-none bg-rose-600/10 text-rose-400 border border-rose-500/20 hover:bg-rose-600/20 px-4 py-2 rounded-xl font-bold transition text-center"
                  >
                    🔴 Hard
                  </button>
                </div>
              </div>
            )}

            {/* Skip Card */}
            <div className="flex justify-end">
              <button 
                onClick={() => {
                  setHintStep(0);
                  setShowAnswer(false);
                  setCurrentCardIdx((prev) => (prev + 1) % flashcards.length);
                }}
                className="text-xs text-slate-500 hover:text-slate-300 font-medium flex items-center space-x-1"
              >
                <span>Skip Card / Next</span>
                <window.LucideChevronRight className="h-3 w-3" />
              </button>
            </div>

          </div>
        )}

      </main>

      {/* FOOTER */}
      <footer className="mt-auto border-t border-slate-800 bg-slate-950 py-4 px-6 text-center text-xs text-slate-400 flex flex-col sm:flex-row justify-between items-center gap-2">
        <p>© 2026 SQL PM Mastery. Built exclusively for technical and product alignment.</p>
        <p className="flex items-center space-x-1">
          <window.LucideDatabase className="h-3 w-3 text-cyan-400" />
          <span>Local client-side execution sandbox mode active.</span>
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));</script></body></html>
